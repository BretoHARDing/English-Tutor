<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Easy English Thai Admin — Offline</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #f8f9fa;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        color: #202124;
      }
      .card {
        background: #fff;
        border-radius: 16px;
        padding: 2.5rem 3rem;
        text-align: center;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        max-width: 400px;
      }
      .icon { font-size: 3rem; margin-bottom: 1rem; }
      h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 0.5rem; }
      p { color: #5f6368; line-height: 1.6; margin: 0 0 1.5rem; }
      button {
        background: #1a73e8;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 10px 24px;
        font-size: 0.9375rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #1557b0; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">📡</div>
      <h1>You're offline</h1>
      <p>
        Check your internet connection and try again. Pages you have already
        visited and audio files you have previewed are still available from
        the local cache.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
