openapi: 3.1.0
info:
  title: Easy English Thai API
  version: 1.0.0
  summary: Pronunciation-first beginner English learning API for Thai speakers
  description: |
    REST API for a mobile-first English learning app focused on Thai-speaking beginners.
    Supports onboarding, lessons, words, sounds, reviews, pronunciation scoring,
    dialogues, downloads, notifications, analytics, and admin CMS operations.
  contact:
    name: API Team
  license:
    name: Proprietary
servers:
  - url: https://api.yourapp.com/v1
    description: Production
  - url: https://staging-api.yourapp.com/v1
    description: Staging

jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema

tags:
  - name: Auth
  - name: Me
  - name: Onboarding
  - name: Courses
  - name: Lessons
  - name: Words
  - name: Sentences
  - name: Sounds
  - name: MinimalPairs
  - name: Home
  - name: Progress
  - name: Review
  - name: Speech
  - name: Dialogues
  - name: Downloads
  - name: Notifications
  - name: Achievements
  - name: Search
  - name: Analytics
  - name: AdminLessons
  - name: AdminWords
  - name: AdminSentences
  - name: AdminSounds
  - name: AdminDialogues
  - name: AdminAssets
  - name: AdminQA
  - name: AdminAnalytics

externalDocs:
  description: Internal API guidelines
  url: https://docs.yourapp.com/api-guidelines

security:
  - bearerAuth: []

paths:

  /health:
    get:
      tags: [Analytics]
      summary: Health check
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
                required: [status, version]
              examples:
                default:
                  value:
                    status: ok
                    version: 1.0.0

  /auth/guest:
    post:
      tags: [Auth]
      summary: Create guest session
      operationId: createGuestSession
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGuestSessionRequest'

            examples:
              default:
                value:
                  device_id: device_abc123
                  interface_language: th
                  app_version: 1.0.0
      responses:
        '200':
          description: Guest session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
                examples:
                  default:
                    $ref: '#/components/examples/AuthResponseExample'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/signup:
    post:
      tags: [Auth]
      summary: Register account
      operationId: signup
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'

            examples:
              default:
                value:
                  email: user@example.com
                  password: StrongPassword123!
                  display_name: Mali
                  interface_language: th
      responses:
        '200':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
                examples:
                  default:
                    $ref: '#/components/examples/AuthResponseExample'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'

            examples:
              default:
                value:
                  email: user@example.com
                  password: StrongPassword123!
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
                examples:
                  default:
                    $ref: '#/components/examples/AuthResponseExample'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'

            examples:
              default:
                value:
                  refresh_token: jwt_refresh_token
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/upgrade-guest:
    post:
      tags: [Auth]
      summary: Convert guest account into registered account
      operationId: upgradeGuest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpgradeGuestRequest'
      responses:
        '200':
          description: Guest upgraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpgradeGuestResponse'
        '409':
          $ref: '#/components/responses/ConflictError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logout completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'

  /me:
    get:
      tags: [Me]
      summary: Get current user profile
      operationId: getMe
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMeResponse'

                examples:
                  default:
                    value:
                      data:
                        id: user_001
                        email: user@example.com
                        display_name: Mali
                        native_language: th
                        interface_language: th
                        learning_goal: daily_life
                        current_level_id: level_0
                        current_lesson_id: lesson_001
                        is_guest: false
                        created_at: '2026-04-07T09:30:00Z'
                      meta: {}
                      error: null
    patch:
      tags: [Me]
      summary: Update current user profile
      operationId: updateMe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeRequest'

            examples:
              default:
                value:
                  display_name: Mali
                  learning_goal: home_conversation
                  native_language: th
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMeResponse'

                examples:
                  default:
                    value:
                      data:
                        id: user_001
                        email: user@example.com
                        display_name: Mali
                        native_language: th
                        interface_language: th
                        learning_goal: daily_life
                        current_level_id: level_0
                        current_lesson_id: lesson_001
                        is_guest: false
                        created_at: '2026-04-07T09:30:00Z'
                      meta: {}
                      error: null
        '422':
          $ref: '#/components/responses/ValidationError'

  /me/settings:
    get:
      tags: [Me]
      summary: Get learner settings
      operationId: getMySettings
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetSettingsResponse'

                examples:
                  default:
                    value:
                      data:
                        interface_language: th
                        thai_translation_enabled: true
                        bilingual_mode: true
                        preferred_voice_gender: female
                        audio_speed_default: normal
                        subtitles_enabled: true
                        notifications_enabled: true
                        daily_reminder_time: '19:00:00'
                        save_recordings: true
                        strict_answer_mode: false
                      meta: {}
                      error: null
    patch:
      tags: [Me]
      summary: Update learner settings
      operationId: updateMySettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSettingsRequest'

            examples:
              default:
                value:
                  preferred_voice_gender: female
                  audio_speed_default: slow
                  daily_reminder_time: '20:00:00'
                  thai_translation_enabled: true
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatedFlagResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /me/recordings:
    delete:
      tags: [Me]
      summary: Delete learner recordings
      operationId: deleteMyRecordings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteRecordingsRequest'
      responses:
        '200':
          description: Recordings deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteRecordingsResponse'

  /onboarding/start:
    post:
      tags: [Onboarding]
      summary: Start onboarding session
      operationId: startOnboarding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartOnboardingRequest'
      responses:
        '200':
          description: Onboarding started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartOnboardingResponse'

  /onboarding/profile:
    post:
      tags: [Onboarding]
      summary: Submit onboarding profile
      operationId: submitOnboardingProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingProfileRequest'
      responses:
        '200':
          description: Profile saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedFlagResponse'

  /onboarding/placement-answer:
    post:
      tags: [Onboarding]
      summary: Submit placement answer
      operationId: submitPlacementAnswer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlacementAnswerRequest'
      responses:
        '200':
          description: Placement answer accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlacementAnswerResponse'

  /onboarding/complete:
    post:
      tags: [Onboarding]
      summary: Complete onboarding
      operationId: completeOnboarding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteOnboardingRequest'
      responses:
        '200':
          description: Onboarding completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompleteOnboardingResponse'

  /courses:
    get:
      tags: [Courses]
      summary: List courses
      operationId: listCourses
      parameters:
        - $ref: '#/components/parameters/SourceLanguage'
        - $ref: '#/components/parameters/TargetLanguage'
        - $ref: '#/components/parameters/Published'
      responses:
        '200':
          description: Courses listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCoursesResponse'

  /courses/{courseId}:
    get:
      tags: [Courses]
      summary: Get course detail
      operationId: getCourse
      parameters:
        - $ref: '#/components/parameters/CourseId'
      responses:
        '200':
          description: Course detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCourseResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /courses/{courseId}/map:
    get:
      tags: [Courses]
      summary: Get course map
      operationId: getCourseMap
      parameters:
        - $ref: '#/components/parameters/CourseId'
      responses:
        '200':
          description: Course map
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCourseMapResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /units/{unitId}/lessons:
    get:
      tags: [Courses]
      summary: List lessons in unit
      operationId: listUnitLessons
      parameters:
        - $ref: '#/components/parameters/UnitId'
      responses:
        '200':
          description: Unit lessons
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListLessonsResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /home:
    get:
      tags: [Home]
      summary: Get learner home dashboard
      operationId: getHome
      responses:
        '200':
          description: Home dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetHomeResponse'
                examples:
                  default:
                    $ref: '#/components/examples/GetHomeResponseExample'

  /progress:
    get:
      tags: [Progress]
      summary: Get learner progress dashboard
      operationId: getProgress
      responses:
        '200':
          description: Progress dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProgressResponse'

                examples:
                  default:
                    value:
                      data:
                        course_completion_percent: 14
                        lessons_completed: 8
                        words_learned: 41
                        dialogues_completed: 3
                        streak_days: 6
                        pronunciation_trend:
                          - week: 1
                            score: 62
                          - week: 2
                            score: 67
                        weak_sounds:
                          - sound_id: sound_r
                            label: R
                            accuracy_score: 41
                        achievements:
                          - code: first_lesson_complete
                            title: First Lesson Complete
                      meta: {}
                      error: null

  /lessons/{lessonId}:
    get:
      tags: [Lessons]
      summary: Get lesson detail
      operationId: getLesson
      parameters:
        - $ref: '#/components/parameters/LessonId'
      responses:
        '200':
          description: Lesson detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetLessonResponse'
                examples:
                  default:
                    $ref: '#/components/examples/GetLessonResponseExample'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /lessons/{lessonId}/steps:
    get:
      tags: [Lessons]
      summary: Get lesson steps
      operationId: getLessonSteps
      parameters:
        - $ref: '#/components/parameters/LessonId'
      responses:
        '200':
          description: Lesson steps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetLessonStepsResponse'
                examples:
                  default:
                    $ref: '#/components/examples/GetLessonStepsResponseExample'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /lessons/{lessonId}/start:
    post:
      tags: [Lessons]
      summary: Start lesson
      operationId: startLesson
      parameters:
        - $ref: '#/components/parameters/LessonId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartLessonRequest'

            examples:
              default:
                value:
                  source: home
      responses:
        '200':
          description: Lesson started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartLessonResponse'

                examples:
                  default:
                    value:
                      data:
                        lesson_progress_id: lp_001
                        status: in_progress
                        started_at: '2026-04-07T09:35:00Z'
                      meta: {}
                      error: null
        '409':
          $ref: '#/components/responses/ConflictError'

  /lessons/{lessonId}/progress:
    get:
      tags: [Lessons]
      summary: Get lesson progress
      operationId: getLessonProgress
      parameters:
        - $ref: '#/components/parameters/LessonId'
      responses:
        '200':
          description: Lesson progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetLessonProgressResponse'

  /lessons/{lessonId}/steps/{stepId}/progress:
    post:
      tags: [Lessons]
      summary: Save lesson step progress
      operationId: saveLessonStepProgress
      parameters:
        - $ref: '#/components/parameters/LessonId'
        - $ref: '#/components/parameters/StepId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveLessonStepProgressRequest'
      responses:
        '200':
          description: Step progress saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveLessonStepProgressResponse'

  /lessons/{lessonId}/complete:
    post:
      tags: [Lessons]
      summary: Complete lesson
      operationId: completeLesson
      parameters:
        - $ref: '#/components/parameters/LessonId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteLessonRequest'

            examples:
              default:
                value:
                  final_score:
                    overall: 81
                    pronunciation: 74
                    comprehension: 89
      responses:
        '200':
          description: Lesson completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompleteLessonResponse'

                examples:
                  default:
                    value:
                      data:
                        lesson_id: lesson_009
                        status: completed
                        completed_at: '2026-04-07T09:48:00Z'
                        awards:
                          - code: lesson_complete
                            title: Lesson Complete
                        recommended_next_actions:
                          - type: lesson
                            target_id: lesson_010
                            title: Next Lesson
                          - type: review
                            target_id: review_words_hard
                            title: Review Hard Words
                      meta: {}
                      error: null

  /words:
    get:
      tags: [Words]
      summary: List words
      operationId: listWords
      parameters:
        - $ref: '#/components/parameters/Category'
        - $ref: '#/components/parameters/LessonIdQuery'
        - $ref: '#/components/parameters/Difficulty'
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/Favorites'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Words listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListWordsResponse'

  /words/{wordId}:
    get:
      tags: [Words]
      summary: Get word detail
      operationId: getWord
      parameters:
        - $ref: '#/components/parameters/WordId'
      responses:
        '200':
          description: Word detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetWordResponse'
                examples:
                  default:
                    $ref: '#/components/examples/GetWordResponseExample'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /words/{wordId}/progress:
    get:
      tags: [Words]
      summary: Get word progress
      operationId: getWordProgress
      parameters:
        - $ref: '#/components/parameters/WordId'
      responses:
        '200':
          description: Word progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetWordProgressResponse'

                examples:
                  default:
                    value:
                      data:
                        word_id: word_water
                        familiarity_score: 72
                        pronunciation_score: 69
                        listening_score: 80
                        speaking_score: 68
                        times_seen: 6
                        times_correct: 5
                        times_incorrect: 1
                        last_seen_at: '2026-04-07T09:47:00Z'
                        next_review_at: '2026-04-08T09:00:00Z'
                        is_hard_word: false
                      meta: {}
                      error: null
    post:
      tags: [Words]
      summary: Update word progress
      operationId: updateWordProgress
      parameters:
        - $ref: '#/components/parameters/WordId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWordProgressRequest'

            examples:
              default:
                value:
                  event_type: review_answered
                  result: correct
                  speaking_score: 74
                  listening_score: 82
                  mark_hard: false
      responses:
        '200':
          description: Word progress updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateWordProgressResponse'

  /words/{wordId}/favorite:
    post:
      tags: [Words]
      summary: Toggle favorite word
      operationId: toggleFavoriteWord
      parameters:
        - $ref: '#/components/parameters/WordId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToggleFavoriteRequest'
      responses:
        '200':
          description: Favorite updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToggleFavoriteResponse'

  /sentences/{sentenceId}:
    get:
      tags: [Sentences]
      summary: Get sentence detail
      operationId: getSentence
      parameters:
        - $ref: '#/components/parameters/SentenceId'
      responses:
        '200':
          description: Sentence detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetSentenceResponse'
                examples:
                  default:
                    $ref: '#/components/examples/GetSentenceResponseExample'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /sentences/{sentenceId}/progress:
    get:
      tags: [Sentences]
      summary: Get sentence progress
      operationId: getSentenceProgress
      parameters:
        - $ref: '#/components/parameters/SentenceId'
      responses:
        '200':
          description: Sentence progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetSentenceProgressResponse'

  /sentence-patterns:
    get:
      tags: [Sentences]
      summary: List sentence patterns
      operationId: listSentencePatterns
      responses:
        '200':
          description: Sentence patterns
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSentencePatternsResponse'

  /sounds:
    get:
      tags: [Sounds]
      summary: List sounds
      operationId: listSounds
      parameters:
        - $ref: '#/components/parameters/Category'
        - $ref: '#/components/parameters/ThaiDifficulty'
      responses:
        '200':
          description: Sounds listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSoundsResponse'

  /sounds/{soundId}:
    get:
      tags: [Sounds]
      summary: Get sound detail
      operationId: getSound
      parameters:
        - $ref: '#/components/parameters/SoundId'
      responses:
        '200':
          description: Sound detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetSoundResponse'
                examples:
                  default:
                    $ref: '#/components/examples/GetSoundResponseExample'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /sounds/{soundId}/progress:
    get:
      tags: [Sounds]
      summary: Get sound progress
      operationId: getSoundProgress
      parameters:
        - $ref: '#/components/parameters/SoundId'
      responses:
        '200':
          description: Sound progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetSoundProgressResponse'

                examples:
                  default:
                    value:
                      data:
                        sound_id: sound_r
                        accuracy_score: 41
                        attempts_count: 12
                        last_practiced_at: '2026-04-07T09:10:00Z'
                        next_review_at: '2026-04-08T09:00:00Z'
                        difficulty_flag: true
                      meta: {}
                      error: null
    post:
      tags: [Sounds]
      summary: Update sound progress
      operationId: updateSoundProgress
      parameters:
        - $ref: '#/components/parameters/SoundId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSoundProgressRequest'
      responses:
        '200':
          description: Sound progress updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatedFlagResponse'

  /minimal-pairs/{groupId}:
    get:
      tags: [MinimalPairs]
      summary: Get minimal pair group
      operationId: getMinimalPairGroup
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          description: Minimal pair group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMinimalPairGroupResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /review:
    get:
      tags: [Review]
      summary: Get review hub summary
      operationId: getReviewSummary
      responses:
        '200':
          description: Review summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetReviewSummaryResponse'

  /review/queue:
    get:
